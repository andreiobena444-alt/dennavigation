<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoutePlanner — Internal Logistics Tool</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --panel:     #161b22;
      --surface:   #1c2330;
      --surface2:  #21293a;
      --border:    #30363d;
      --accent:    #f0a500;
      --accent2:   #e05c2e;
      --text:      #e6edf3;
      --muted:     #7d8590;
      --success:   #3fb950;
      --danger:    #f85149;
      --sidebar-w: 390px;
      --font-mono: 'DM Mono', monospace;
      --font-head: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── App Layout ────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    #sidebar-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 3px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }

    .logo-text {
      font-family: var(--font-head);
      font-weight: 800; font-size: 16px;
      letter-spacing: -0.5px; color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    .logo-sub {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-left: 38px;
    }

    /* ── Sidebar Body ──────────────────────────────────────── */
    #sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #sidebar-body::-webkit-scrollbar { width: 4px; }
    #sidebar-body::-webkit-scrollbar-track { background: transparent; }
    #sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-label {
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }

    /* ── Stop Rows ─────────────────────────────────────────── */
    #stops-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stop-row {
      display: flex;
      align-items: center;
      gap: 7px;
      animation: slideIn 0.18s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stop-num-badge {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500;
      color: var(--muted);
      flex-shrink: 0;
      font-family: var(--font-head);
    }

    .stop-num-badge.first-badge {
      background: var(--accent); border-color: var(--accent);
      color: #0d1117;
    }

    .stop-input-wrap {
      position: relative;
      flex: 1;
    }

    .location-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 8px 28px 8px 10px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .location-input:focus {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .location-input::placeholder { color: var(--muted); }

    /* Geocoded indicator inside input */
    .location-input.geocoded {
      border-color: var(--success);
      padding-right: 28px;
    }

    .geocode-indicator {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .geocode-indicator.visible { opacity: 1; }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: var(--border);
      font-size: 14px;
      padding: 0 2px;
      flex-shrink: 0;
      user-select: none;
      transition: color 0.15s;
    }
    .drag-handle:hover { color: var(--muted); }

    /* Remove button */
    .remove-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      line-height: 1;
    }

    .remove-btn:hover {
      background: rgba(248,81,73,0.15);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Add Stop Button ───────────────────────────────────── */
    .add-stop-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
      margin-top: 4px;
    }

    .add-stop-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Options Row ───────────────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-label {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
    }

    .toggle-switch {
      position: relative;
      width: 36px; height: 20px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--border); border-radius: 20px;
      transition: 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--text);
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .toggle-slider { background: var(--accent); }
    input:checked + .toggle-slider::before { transform: translateX(16px); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; padding: 10px 16px;
      border-radius: 7px; border: none;
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent); color: #0d1117;
      width: 100%; padding: 12px;
      font-size: 13px;
      font-family: var(--font-head);
      font-weight: 700; letter-spacing: 0.04em;
    }

    .btn-primary:hover:not(:disabled) {
      background: #ffc025;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(240,165,0,0.25);
    }

    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); flex: 1;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--accent); color: var(--accent);
    }

    .btn-ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); flex: 1;
    }

    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

    .action-row { display: flex; gap: 8px; }

    /* ── Loading ───────────────────────────────────────────── */
    #loading-bar {
      display: none;
      flex-direction: column; gap: 8px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    #loading-bar.active { display: flex; }

    .loading-text { font-size: 11px; color: var(--muted); }

    .loading-track {
      height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden;
    }

    .loading-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; width: 0%;
      transition: width 0.3s ease;
    }

    /* ── Stats Bar ─────────────────────────────────────────── */
    #stats-bar {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }

    #stats-bar.visible { display: block; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }

    .stat-item {
      padding: 10px 12px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .stat-item:last-child { border-right: none; }

    .stat-val {
      font-family: var(--font-head);
      font-weight: 700; font-size: 16px;
      color: var(--accent); display: block;
    }

    .stat-lbl {
      font-size: 9px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* ── Itinerary ─────────────────────────────────────────── */
    #itinerary { display: none; flex-direction: column; gap: 0; }
    #itinerary.visible { display: flex; }

    .itin-stop {
      display: flex; gap: 10px;
      padding: 10px 0;
      position: relative;
    }

    .itin-stop:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 13px; top: 36px; bottom: -4px;
      width: 1px;
      border-left: 1px dashed var(--border);
    }

    .stop-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 500;
      flex-shrink: 0; color: var(--muted);
      margin-top: 1px;
      position: relative; z-index: 1;
      font-family: var(--font-head);
    }

    .stop-badge.start { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .stop-badge.end   { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    .stop-info { flex: 1; min-width: 0; }

    .stop-name {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .stop-meta { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .stop-leg {
      font-size: 10px; color: var(--accent);
      text-align: right; white-space: nowrap; padding-top: 3px;
    }

    /* ── Error Box ─────────────────────────────────────────── */
    #error-box {
      display: none;
      background: rgba(248,81,73,0.1);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px; color: var(--danger); line-height: 1.5;
    }

    #error-box.visible { display: block; }

    /* ── Map ───────────────────────────────────────────────── */
    #map-area {
      flex: 1;
      position: relative;
      background: #1a2332;
    }

    #map { width: 100%; height: 100%; }

    #map-badge {
      position: absolute; top: 14px; left: 14px;
      z-index: 999;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 10px; color: var(--muted);
      pointer-events: none;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    #map-badge span { color: var(--accent); font-weight: 500; }

    /* Leaflet dark skin */
    .leaflet-control-zoom a {
      background: var(--panel) !important; color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface) !important; }
    .leaflet-control-attribution {
      background: rgba(13,17,23,0.7) !important;
      color: var(--muted) !important; font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: var(--muted) !important; }

    /* ── Autocomplete Dropdown ─────────────────────────────── */
    /* Rendered as fixed overlay on <body> — avoids sidebar overflow clipping */
    .ac-dropdown {
      position: fixed;
      z-index: 99999;
      background: var(--panel);
      border: 1px solid var(--accent);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: none;
      min-width: 200px;
      max-height: 220px;
      overflow-y: auto;
    }

    .ac-dropdown.open { display: block; }

    .ac-item {
      padding: 9px 12px;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
      transition: background 0.1s;
    }

    .ac-item:last-child { border-bottom: none; }

    .ac-item:hover, .ac-item.highlighted {
      background: var(--surface2);
      color: var(--accent);
    }

    .ac-item .ac-main { font-weight: 500; }
    .ac-item .ac-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .ac-spinner {
      padding: 10px 12px;
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
    }

    .spinner-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1s infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }

    /* ── Drag/Drop Visual ──────────────────────────────────── */
    .stop-row.drag-over {
      border-radius: 7px;
      outline: 1px dashed var(--accent);
      outline-offset: 2px;
    }

    .stop-row.dragging { opacity: 0.4; }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 700px) {
      :root { --sidebar-w: 100vw; }
      #app { flex-direction: column; }
      #sidebar { width: 100%; min-width: 100%; height: 55vh; }
      #map-area { height: 45vh; }
      html, body { overflow: auto; }
    }

    /* ══════════════════════════════════════════════
       PRINT STYLES
       Page 1 = Itinerary  |  Page 2 = Full Map
    ══════════════════════════════════════════════ */
    @media print {
      @page { margin: 14mm; size: A4 portrait; }
      @page :first { size: A4 portrait; }
      @page map-page { size: A4 landscape; margin: 8mm; }

      html, body {
        overflow: visible !important;
        background: #fff !important;
        color: #000 !important;
        font-size: 11pt !important;
      }

      #app {
        display: block !important;
        height: auto !important;
        width: 100% !important;
      }

      /* ── Sidebar → Page 1 ── */
      #sidebar {
        width: 100% !important;
        min-width: 100% !important;
        height: auto !important;
        border: none !important;
        overflow: visible !important;
        background: #fff !important;
        display: block !important;
        page-break-after: always;
      }

      #sidebar-body {
        overflow: visible !important;
        gap: 10pt !important;
        padding: 0 !important;
      }

      #sidebar-header {
        background: #fff !important;
        border-bottom: 1.5pt solid #ddd !important;
        padding: 0 0 10pt !important;
        margin-bottom: 12pt !important;
      }

      .logo-text { color: #111 !important; font-size: 16pt !important; }
      .logo-text span { color: #c87800 !important; }
      .logo-sub { color: #666 !important; }

      /* Hide interactive elements on print */
      #stops-section,
      #options-section,
      #generate-btn,
      .action-row,
      #loading-bar,
      #error-box,
      .add-stop-btn,
      .ac-dropdown,
      #map-badge { display: none !important; }

      /* Stats bar */
      #stats-bar {
        display: block !important;
        border: 1pt solid #ddd !important;
        background: #f9f9f9 !important;
        border-radius: 4pt !important;
        margin-bottom: 10pt !important;
      }

      .stats-grid { border: none !important; }

      .stat-item {
        border-right: 1pt solid #ddd !important;
        padding: 8pt 10pt !important;
      }

      .stat-val { color: #c87800 !important; font-size: 14pt !important; }
      .stat-lbl { color: #888 !important; }

      /* Itinerary */
      #itinerary-section { display: block !important; }
      #itinerary { display: flex !important; }

      .stop-name { color: #111 !important; font-size: 11pt !important; }
      .stop-meta { color: #777 !important; }
      .stop-leg  { color: #c87800 !important; }

      .itin-stop::after { border-left: 1pt dashed #ccc !important; }

      .stop-badge {
        background: #eee !important;
        border-color: #ccc !important;
        color: #555 !important;
      }

      .stop-badge.start { background: #f0a500 !important; border-color: #f0a500 !important; color: #fff !important; }
      .stop-badge.end   { background: #e05c2e !important; border-color: #e05c2e !important; color: #fff !important; }

      .section-label { color: #888 !important; }

      /* Print metadata row */
      #print-meta { display: flex !important; }

      /* ── Map → Page 2 ── */
      #map-area {
        display: block !important;
        width: 100% !important;
        height: 190mm !important;    /* A4 content height approx */
        page-break-before: always;
        position: relative !important;
        border: none !important;
        border-radius: 0 !important;
      }

      #map {
        width: 100% !important;
        height: 100% !important;
        /* Let Leaflet tiles render as-is; browser will print what's visible */
        filter: none !important;   /* remove dark filter for print */
      }

      /* Leaflet tile brightness fix for print */
      .leaflet-tile { filter: brightness(1) saturate(1) !important; }

      /* Map page header */
      #map-print-header { display: block !important; }

      .leaflet-control-attribution { display: none !important; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- ══════════════════════════════════
       SIDEBAR
  ══════════════════════════════════ -->
  <div id="sidebar">

    <div id="sidebar-header">
      <div class="logo-row">
        <div class="logo-icon">🗺</div>
        <div class="logo-text">Route<span>Planner</span></div>
      </div>
      <div class="logo-sub">Internal Logistics Tool</div>
    </div>

    <div id="sidebar-body">

      <!-- Print-only metadata -->
      <div id="print-meta" style="display:none; font-size:10pt; color:#666; margin-bottom:6pt; gap:16pt; flex-wrap:wrap;">
        <span id="print-date-text"></span>
        <span id="print-route-summary"></span>
      </div>

      <!-- ── Stop Inputs ── -->
      <div id="stops-section">
        <div class="section-label">📍 Stops — type to search, select to confirm</div>
        <div id="stops-container">
          <!-- dynamically filled by JS -->
        </div>
        <button class="add-stop-btn" onclick="addStopRow()">
          <span>＋</span> Add Stop
        </button>
      </div>

      <!-- ── Options ── -->
      <div id="options-section">
        <div class="section-label">⚙ Options</div>
        <div class="toggle-row">
          <span class="toggle-label">Auto-optimize route order (Nearest Neighbor)</span>
          <label class="toggle-switch">
            <input type="checkbox" id="optimize-toggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- ── Generate ── -->
      <button class="btn btn-primary" id="generate-btn" onclick="generateRoute()">
        ⚡ Generate Route
      </button>

      <!-- ── Loading ── -->
      <div id="loading-bar">
        <div class="loading-text" id="loading-text">Geocoding…</div>
        <div class="loading-track"><div class="loading-fill" id="loading-fill"></div></div>
      </div>

      <!-- ── Error ── -->
      <div id="error-box"></div>

      <!-- ── Stats ── -->
      <div id="stats-bar">
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-val" id="stat-stops">—</span>
            <span class="stat-lbl">Stops</span>
          </div>
          <div class="stat-item">
            <span class="stat-val" id="stat-dist">—</span>
            <span class="stat-lbl">Distance</span>
          </div>
          <div class="stat-item">
            <span class="stat-val" id="stat-time">—</span>
            <span class="stat-lbl">Est. Time</span>
          </div>
        </div>
      </div>

      <!-- ── Action Buttons ── -->
      <div class="action-row" id="action-row" style="display:none;">
        <button class="btn btn-secondary" onclick="exportPDF()">🖨 Export PDF</button>
        <button class="btn btn-secondary" onclick="openGoogleMaps()">🗺 Google Maps</button>
        <button class="btn btn-ghost" onclick="resetAll()">✕ Reset</button>
      </div>

      <!-- ── Itinerary ── -->
      <div id="itinerary-section" style="display:none;">
        <div class="section-label">🚗 Route Itinerary</div>
        <div id="itinerary"></div>
      </div>

    </div><!-- /sidebar-body -->
  </div><!-- /sidebar -->

  <!-- ══════════════════════════════════
       MAP
  ══════════════════════════════════ -->
  <div id="map-area">

    <!-- Print-only map header (page 2) -->
    <div id="map-print-header" style="display:none; position:absolute; top:0; left:0; right:0;
         background:rgba(255,255,255,0.92); padding:8px 12px; z-index:2000;
         border-bottom:1px solid #ddd; font-family:'Syne',sans-serif; font-weight:700; font-size:13px;">
      Route Map — <span id="map-header-summary" style="font-weight:400; font-size:11px; color:#666;"></span>
    </div>

    <div id="map-badge">Map · <span id="map-status">Awaiting input</span></div>
    <div id="map"></div>
  </div>

</div><!-- /app -->

<!-- Shared autocomplete dropdown (appended to body, positioned via JS) -->
<div id="global-ac-dropdown" class="ac-dropdown"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   ROUTE PLANNER v2 — Core Logic
   ══════════════════════════════════════════════════════════════ */

// ── State ───────────────────────────────────────────────────
let map = null;
let markers = [];
let routeLayer = null;
let currentRoute = null;
let stopIdCounter = 0;
let activeInput = null;       // The input currently showing the dropdown
let acDebounceTimer = null;   // Debounce timer for autocomplete
let acLastQuery = '';         // Avoid duplicate requests

// ── Marker colour palette ────────────────────────────────────
const COLORS = [
  '#f0a500','#e05c2e','#3fb950','#58a6ff','#bc8cff',
  '#ff7b72','#56d364','#79c0ff','#d2a8ff','#ffa657',
  '#ff6e96','#39d3f0','#ffcb6b','#c3e88d','#f78c6c',
  '#e2c08d','#a8dadc','#f4d35e','#ee6c4d','#98c1d9'
];

/* ══════════════════════════════════════════════
   MAP INIT
══════════════════════════════════════════════ */
function initMap() {
  if (map) return;
  map = L.map('map', {
    center: [14.5995, 120.9842],  // Manila default
    zoom: 12,
    zoomControl: false
  });

L.control.zoom({
  position: 'bottomleft'
}).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
}

/* ══════════════════════════════════════════════
   STOP ROW MANAGEMENT
══════════════════════════════════════════════ */
function addStopRow(name = '', lat = null, lon = null) {
  const container = document.getElementById('stops-container');
  const count = container.children.length;
  if (count >= 20) {
    showError('⚠ Maximum 20 stops supported.');
    return;
  }

  const id = ++stopIdCounter;
  const row = document.createElement('div');
  row.className = 'stop-row';
  row.dataset.id = id;
  row.draggable = true;

  const isFirst = count === 0;
  row.innerHTML = `
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <div class="stop-num-badge ${isFirst ? 'first-badge' : ''}">${count + 1}</div>
    <div class="stop-input-wrap">
      <input
        type="text"
        class="location-input ${lat ? 'geocoded' : ''}"
        placeholder="Stop ${count + 1} — type to search"
        autocomplete="off"
        value="${escHtml(name)}"
        data-lat="${lat || ''}"
        data-lon="${lon || ''}"
      />
      <span class="geocode-indicator ${lat ? 'visible' : ''}" title="Location confirmed">✓</span>
    </div>
    <button class="remove-btn" onclick="removeStopRow(this)" title="Remove stop">×</button>
  `;

  container.appendChild(row);
  attachInputHandlers(row.querySelector('.location-input'));
  attachDragHandlers(row);
  renumberBadges();

  // Focus the new input if it's empty
  if (!name) row.querySelector('.location-input').focus();
}

function removeStopRow(btn) {
  const row = btn.closest('.stop-row');
  row.remove();
  renumberBadges();
  hideDropdown();
}

function renumberBadges() {
  const rows = document.querySelectorAll('.stop-row');
  rows.forEach((row, i) => {
    const badge = row.querySelector('.stop-num-badge');
    badge.textContent = i + 1;
    badge.classList.toggle('first-badge', i === 0);
    row.querySelector('.location-input').placeholder = `Stop ${i + 1} — type to search`;
  });
}

/* ══════════════════════════════════════════════
   DRAG & DROP REORDERING
══════════════════════════════════════════════ */
function attachDragHandlers(row) {
  row.addEventListener('dragstart', e => {
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', row.dataset.id);
    setTimeout(() => row.classList.add('dragging'), 0);
  });

  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    document.querySelectorAll('.stop-row').forEach(r => r.classList.remove('drag-over'));
  });

  row.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.stop-row').forEach(r => r.classList.remove('drag-over'));
    row.classList.add('drag-over');
  });

  row.addEventListener('drop', e => {
    e.preventDefault();
    const fromId = e.dataTransfer.getData('text/plain');
    const fromRow = document.querySelector(`.stop-row[data-id="${fromId}"]`);
    const container = document.getElementById('stops-container');
    if (fromRow && fromRow !== row) {
      container.insertBefore(fromRow, row);
    }
    row.classList.remove('drag-over');
    renumberBadges();
  });
}

/* ══════════════════════════════════════════════
   AUTOCOMPLETE — Nominatim
══════════════════════════════════════════════ */
const dropdown = document.getElementById('global-ac-dropdown');
let acHighlightIndex = -1;

function attachInputHandlers(input) {
  // Typing → trigger autocomplete
  input.addEventListener('input', () => {
    // Clear cached coords when user edits the text
    input.dataset.lat = '';
    input.dataset.lon = '';
    input.classList.remove('geocoded');
    input.closest('.stop-input-wrap').querySelector('.geocode-indicator').classList.remove('visible');

    clearTimeout(acDebounceTimer);
    const val = input.value.trim();
    if (val.length < 3) { hideDropdown(); return; }

    // Show spinner immediately
    showSpinner(input);

    acDebounceTimer = setTimeout(async () => {
      if (input.value.trim() === acLastQuery) return;
      acLastQuery = input.value.trim();
      const results = await fetchSuggestions(input.value.trim());
      if (activeInput === input) renderDropdown(input, results);
    }, 320);
  });

  input.addEventListener('focus', () => {
    activeInput = input;
    // Re-show if there's a value without coords
    if (input.value.length >= 3 && !input.dataset.lat) {
      clearTimeout(acDebounceTimer);
      acDebounceTimer = setTimeout(async () => {
        const results = await fetchSuggestions(input.value.trim());
        if (activeInput === input) renderDropdown(input, results);
      }, 100);
    }
  });

  input.addEventListener('blur', () => {
    // Small delay to allow click on dropdown item
    setTimeout(() => {
      if (activeInput === input) hideDropdown();
    }, 180);
  });

  // Keyboard navigation in dropdown
  input.addEventListener('keydown', e => {
    const items = dropdown.querySelectorAll('.ac-item');
    if (!items.length) return;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acHighlightIndex = Math.min(acHighlightIndex + 1, items.length - 1);
      refreshHighlight(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acHighlightIndex = Math.max(acHighlightIndex - 1, 0);
      refreshHighlight(items);
    } else if (e.key === 'Enter') {
      if (acHighlightIndex >= 0 && items[acHighlightIndex]) {
        items[acHighlightIndex].dispatchEvent(new MouseEvent('mousedown'));
        e.preventDefault();
      }
    } else if (e.key === 'Escape') {
      hideDropdown();
    }
  });
}

function refreshHighlight(items) {
  items.forEach((it, i) => it.classList.toggle('highlighted', i === acHighlightIndex));
  if (items[acHighlightIndex]) {
    items[acHighlightIndex].scrollIntoView({ block: 'nearest' });
  }
}

function positionDropdown(input) {
  const rect = input.getBoundingClientRect();
  dropdown.style.top    = (rect.bottom + 3) + 'px';
  dropdown.style.left   = rect.left + 'px';
  dropdown.style.width  = rect.width + 'px';
}

function showSpinner(input) {
  activeInput = input;
  positionDropdown(input);
  dropdown.innerHTML = `
    <div class="ac-spinner">
      <div class="spinner-dot"></div>
      Searching…
    </div>`;
  dropdown.classList.add('open');
}

function renderDropdown(input, results) {
  positionDropdown(input);
  dropdown.innerHTML = '';
  acHighlightIndex = -1;

  if (!results.length) {
    dropdown.innerHTML = `<div class="ac-spinner" style="color:var(--muted)">No results found</div>`;
    dropdown.classList.add('open');
    return;
  }

  results.forEach(r => {
    const parts = r.display_name.split(', ');
    const main  = parts.slice(0, 2).join(', ');
    const sub   = parts.slice(2).join(', ');

    const item = document.createElement('div');
    item.className = 'ac-item';
    item.innerHTML = `
      <div class="ac-main">${escHtml(main)}</div>
      ${sub ? `<div class="ac-sub">${escHtml(sub)}</div>` : ''}
    `;

    // mousedown fires before blur, so we can select before the input loses focus
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      selectSuggestion(input, r);
    });

    dropdown.appendChild(item);
  });

  dropdown.classList.add('open');
}

function hideDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  acHighlightIndex = -1;
}

function selectSuggestion(input, suggestion) {
  // Use short form: first 2 parts of display_name
  const parts = suggestion.display_name.split(', ');
  input.value = parts.slice(0, 3).join(', ');

  // Cache coordinates → skip geocoding later
  input.dataset.lat = suggestion.lat;
  input.dataset.lon = suggestion.lon;
  input.classList.add('geocoded');
  const indicator = input.closest('.stop-input-wrap').querySelector('.geocode-indicator');
  if (indicator) indicator.classList.add('visible');

  hideDropdown();

  // Move focus to next empty input automatically
  const allInputs = Array.from(document.querySelectorAll('.location-input'));
  const myIdx = allInputs.indexOf(input);
  if (myIdx < allInputs.length - 1) {
    allInputs[myIdx + 1].focus();
  }
}

// Fetch suggestions from Nominatim (Philippines scoped)
async function fetchSuggestions(query) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=ph&addressdetails=0`;
    const resp = await fetch(url, {
      headers: { 'Accept-Language': 'en', 'User-Agent': 'RoutePlannerInternal/1.0' }
    });
    if (!resp.ok) return [];
    return await resp.json();
  } catch {
    return [];
  }
}

/* ══════════════════════════════════════════════
   GEOCODING (fallback for unselected inputs)
══════════════════════════════════════════════ */
async function geocode(name) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(name)}&format=json&limit=1&countrycodes=ph`;
  const resp = await fetch(url, {
    headers: { 'Accept-Language': 'en', 'User-Agent': 'RoutePlannerInternal/1.0' }
  });
  if (!resp.ok) throw new Error(`Geocoding failed: ${name}`);
  const data = await resp.json();
  if (!data?.length) return null;
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display_name: data[0].display_name };
}

/* ══════════════════════════════════════════════
   ROUTING (OSRM)
══════════════════════════════════════════════ */
async function getRouteLeg(fromLat, fromLon, toLat, toLon) {
  const url = `https://router.project-osrm.org/route/v1/driving/${fromLon},${fromLat};${toLon},${toLat}?overview=full&geometries=geojson`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('OSRM request failed');
  const data = await resp.json();
  if (data.code !== 'Ok' || !data.routes?.length) return null;
  return {
    distanceM: data.routes[0].distance,
    durationS: data.routes[0].duration,
    geometry:  data.routes[0].geometry
  };
}

/* ══════════════════════════════════════════════
   NEAREST NEIGHBOR OPTIMIZATION
══════════════════════════════════════════════ */
function nearestNeighbor(pts) {
  const n = pts.length;
  const visited = new Array(n).fill(false);
  const order = [0];
  visited[0] = true;
  for (let i = 1; i < n; i++) {
    const last = order[order.length - 1];
    let best = -1, bestD = Infinity;
    for (let j = 0; j < n; j++) {
      if (visited[j]) continue;
      const d = haversine(pts[last].lat, pts[last].lon, pts[j].lat, pts[j].lon);
      if (d < bestD) { bestD = d; best = j; }
    }
    visited[best] = true;
    order.push(best);
  }
  return order.map(i => pts[i]);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ══════════════════════════════════════════════
   FORMAT HELPERS
══════════════════════════════════════════════ */
function fmtDist(m) {
  return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
}
function fmtTime(s) {
  const m = Math.round(s / 60);
  if (m < 60) return `${m} min`;
  const h = Math.floor(m / 60), r = m % 60;
  return r > 0 ? `${h}h ${r}m` : `${h}h`;
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ══════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════ */
function setLoading(active, text = '', progress = 0) {
  const bar  = document.getElementById('loading-bar');
  const txt  = document.getElementById('loading-text');
  const fill = document.getElementById('loading-fill');
  if (active) {
    bar.classList.add('active');
    txt.textContent = text;
    fill.style.width = progress + '%';
  } else {
    bar.classList.remove('active');
  }
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.classList.add('visible');
}

function clearError() {
  document.getElementById('error-box').classList.remove('visible');
}

function setMapStatus(t) {
  document.getElementById('map-status').textContent = t;
}

/* ══════════════════════════════════════════════
   MAP HELPERS
══════════════════════════════════════════════ */
function clearMap() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

function placeMarker(lat, lon, label, color, popupHtml) {
  const icon = L.divIcon({
    className: '',
    iconAnchor: [16, 32],
    popupAnchor: [0, -34],
    html: `<div style="
      width:32px;height:32px;
      background:${color};
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      border:2.5px solid rgba(255,255,255,0.95);
      box-shadow:0 3px 10px rgba(0,0,0,0.45);
      display:flex;align-items:center;justify-content:center;
    "><span style="
      transform:rotate(45deg);
      font-size:11px;font-weight:700;color:#fff;
      font-family:'Syne',sans-serif;display:block;
    ">${label}</span></div>`
  });
  const mk = L.marker([lat, lon], { icon }).addTo(map).bindPopup(popupHtml);
  markers.push(mk);
  return mk;
}

function drawRoute(geometries) {
  const allCoords = [];
  geometries.forEach(geo => {
    if (!geo) return;
    geo.coordinates.forEach(c => allCoords.push([c[1], c[0]]));
  });
  routeLayer = L.polyline(allCoords, {
    color: '#f0a500', weight: 4.5, opacity: 0.88
  }).addTo(map);
}

/* ══════════════════════════════════════════════
   MAIN: GENERATE ROUTE
══════════════════════════════════════════════ */
async function generateRoute() {
  clearError();
  hideDropdown();

  // Collect inputs
  const rows   = document.querySelectorAll('.stop-row');
  const inputs = Array.from(rows).map(r => r.querySelector('.location-input'));
  const filled = inputs.filter(i => i.value.trim());

  if (filled.length < 2) {
    showError('⚠ Please enter at least 2 locations.');
    return;
  }

  document.getElementById('generate-btn').disabled = true;
  document.getElementById('action-row').style.display = 'none';
  document.getElementById('itinerary-section').style.display = 'none';
  document.getElementById('stats-bar').classList.remove('visible');
  initMap();
  clearMap();

  // ── Step 1: Collect / Geocode ─────────────────────────────
  setLoading(true, `Resolving ${filled.length} locations…`, 5);
  setMapStatus('Geocoding…');

  const points = [];
  const failed = [];

  for (let i = 0; i < filled.length; i++) {
    const inp = filled[i];
    const name = inp.value.trim();
    setLoading(true, `Resolving ${i+1}/${filled.length}: "${name}"…`, 5 + (i / filled.length) * 40);

    // If user selected from autocomplete → coords already stored, skip API call
    if (inp.dataset.lat && inp.dataset.lon) {
      points.push({
        name,
        lat: parseFloat(inp.dataset.lat),
        lon: parseFloat(inp.dataset.lon)
      });
      continue;
    }

    // Fallback geocoding (with rate-limit throttle)
    if (i > 0) await sleep(1100);
    try {
      const geo = await geocode(name);
      if (geo) points.push({ name, lat: geo.lat, lon: geo.lon });
      else     failed.push(name);
    } catch { failed.push(name); }
  }

  if (failed.length) {
    showError(`⚠ Could not geocode: ${failed.join(', ')}. Try selecting from the autocomplete dropdown for accuracy.`);
  }

  if (points.length < 2) {
    setLoading(false);
    showError('❌ Not enough valid locations. Please check your input.');
    document.getElementById('generate-btn').disabled = false;
    setMapStatus('Error');
    return;
  }

  // ── Step 2: Optimize ────────────────────────────────────
  setLoading(true, 'Optimizing route order…', 50);
  const doOptimize = document.getElementById('optimize-toggle').checked;
  const ordered = doOptimize ? nearestNeighbor(points) : [...points];

  // Place markers
  ordered.forEach((pt, i) => {
    const color = COLORS[i % COLORS.length];
    const label = i === 0 ? '▶' : i === ordered.length - 1 ? '■' : i;
    placeMarker(pt.lat, pt.lon, label, color,
      `<b style="font-family:Syne,sans-serif;">${escHtml(pt.name)}</b>
       <br><span style="font-size:10px;color:#888;">Stop ${i+1} of ${ordered.length}</span>`
    );
  });

  // ── Step 3: Route Legs ───────────────────────────────────
  const legs = [];
  const geos  = [];
  let totalDist = 0, totalTime = 0;

  for (let i = 0; i < ordered.length - 1; i++) {
    setLoading(true, `Routing leg ${i+1} of ${ordered.length-1}…`, 55 + (i / (ordered.length-1)) * 38);
    try {
      const leg = await getRouteLeg(
        ordered[i].lat,   ordered[i].lon,
        ordered[i+1].lat, ordered[i+1].lon
      );
      legs.push(leg);
      if (leg) { geos.push(leg.geometry); totalDist += leg.distanceM; totalTime += leg.durationS; }
    } catch { legs.push(null); }
    await sleep(150);
  }
  legs.push(undefined); // sentinel for last stop

  // ── Step 4: Render ───────────────────────────────────────
  setLoading(true, 'Rendering map…', 97);
  drawRoute(geos);

  if (markers.length > 0) {
    map.fitBounds(L.featureGroup(markers).getBounds().pad(0.12));
  }

  currentRoute = { stops: ordered, legs, totalDist, totalTime };

  // Update stats
  document.getElementById('stat-stops').textContent = ordered.length;
  document.getElementById('stat-dist').textContent  = fmtDist(totalDist);
  document.getElementById('stat-time').textContent  = fmtTime(totalTime);
  document.getElementById('stats-bar').classList.add('visible');

  buildItinerary(ordered, legs);
  document.getElementById('action-row').style.display = 'flex';

  setLoading(false);
  setMapStatus(`${ordered.length} stops · ${fmtDist(totalDist)}`);
  document.getElementById('generate-btn').disabled = false;

  // Prep print metadata
  const now = new Date().toLocaleString('en-PH', { dateStyle: 'medium', timeStyle: 'short' });
  document.getElementById('print-date-text').textContent = `Generated: ${now}`;
  document.getElementById('print-route-summary').textContent =
    `${ordered.length} stops · ${fmtDist(totalDist)} · ${fmtTime(totalTime)}`;
  document.getElementById('map-header-summary').textContent =
    `${ordered.length} stops · ${fmtDist(totalDist)} · ${fmtTime(totalTime)} · Generated ${now}`;
}

/* ══════════════════════════════════════════════
   ITINERARY BUILD
══════════════════════════════════════════════ */
function buildItinerary(stops, legs) {
  const container = document.getElementById('itinerary');
  container.innerHTML = '';

  stops.forEach((stop, i) => {
    const isStart = i === 0;
    const isEnd   = i === stops.length - 1;
    const leg     = legs[i];
    const color   = COLORS[i % COLORS.length];
    const badgeClass = isStart ? 'start' : isEnd ? 'end' : '';
    const labelStr   = isStart ? '▶' : isEnd ? '■' : i;

    const div = document.createElement('div');
    div.className = 'itin-stop';
    div.innerHTML = `
      <div class="stop-badge ${badgeClass}"
           style="${badgeClass ? '' : `border-color:${color};color:${color};`}">${labelStr}</div>
      <div class="stop-info">
        <div class="stop-name" title="${escHtml(stop.name)}">${escHtml(stop.name)}</div>
        <div class="stop-meta">${stop.lat.toFixed(4)}, ${stop.lon.toFixed(4)}</div>
      </div>
      <div class="stop-leg">${leg
        ? `${fmtDist(leg.distanceM)}<br>${fmtTime(leg.durationS)}`
        : isEnd
          ? '<span style="color:var(--accent2)">End</span>'
          : ''
      }</div>
    `;
    container.appendChild(div);
  });

  container.classList.add('visible');
  document.getElementById('itinerary-section').style.display = 'block';
}

/* ══════════════════════════════════════════════
   EXPORT PDF
   Page 1 = Itinerary | Page 2 = Full-screen map
══════════════════════════════════════════════ */
function exportPDF() {
  if (!currentRoute) return;

  // Before printing, ensure map is full-sized and tiles are loaded
  // Show the print-only map header
  document.getElementById('map-print-header').style.display = 'block';
  document.getElementById('print-meta').style.display = 'flex';

  // Invalidate Leaflet size so it redraws correctly in print layout
  if (map) {
    map.invalidateSize();
    // Fit bounds again so everything is visible
    if (markers.length > 0) {
      map.fitBounds(L.featureGroup(markers).getBounds().pad(0.08), { animate: false });
    }
  }

  // Small delay for tile rerender, then print
  setTimeout(() => {
    window.print();

    // After printing, hide print-only elements
    setTimeout(() => {
      document.getElementById('map-print-header').style.display = 'none';
      document.getElementById('print-meta').style.display = 'none';
      if (map) map.invalidateSize();
    }, 800);
  }, 300);
}

/* ══════════════════════════════════════════════
   GOOGLE MAPS LINK
══════════════════════════════════════════════ */
function openGoogleMaps() {
  if (!currentRoute) return;
  const parts = currentRoute.stops.map(s => `${s.lat},${s.lon}`);
  window.open(`https://www.google.com/maps/dir/${parts.join('/')}`, '_blank');
}

/* ══════════════════════════════════════════════
   RESET
══════════════════════════════════════════════ */
function resetAll() {
  clearMap();
  currentRoute = null;
  document.getElementById('stats-bar').classList.remove('visible');
  document.getElementById('itinerary').classList.remove('visible');
  document.getElementById('itinerary-section').style.display = 'none';
  document.getElementById('action-row').style.display = 'none';
  clearError();
  setMapStatus('Awaiting input');
  if (map) map.setView([14.5995, 120.9842], 12);
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  initMap();

  // Seed 3 default stop rows
  addStopRow(); addStopRow(); addStopRow();

  // Close dropdown when clicking elsewhere
  document.addEventListener('mousedown', e => {
    if (!dropdown.contains(e.target) && !e.target.classList.contains('location-input')) {
      hideDropdown();
    }
  });

  // Reposition dropdown on scroll/resize
  window.addEventListener('resize', () => {
    if (activeInput && dropdown.classList.contains('open')) {
      positionDropdown(activeInput);
    }
  });

  document.getElementById('sidebar-body').addEventListener('scroll', () => {
    if (activeInput && dropdown.classList.contains('open')) {
      positionDropdown(activeInput);
    }
  });
});
</script>
</body>
</html>
